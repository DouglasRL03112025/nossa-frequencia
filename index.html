<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa Frequência | Ritual de Conexão</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #ff7597;
            --text-main: #ffffff;
            --glass: rgba(255, 255, 255, 0.08);
            /* Cores das Fases */
            --fase1: linear-gradient(135deg, #1a2a24 0%, #0d1412 100%);
            --fase2: linear-gradient(135deg, #2a1f14 0%, #14100d 100%);
            --fase3: linear-gradient(135deg, #2a1414 0%, #140d0d 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--fase1);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 1.5s ease;
        }

        /* Fundo Animado Sutil */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,117,151,0.05) 0%, transparent 50%);
            animation: move 20s infinite alternate;
            z-index: 0;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(10%, 10%); }
        }

        #app-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: transform 0.4s ease;
        }

        .header-meta {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: 600;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin: 0 0 20px 0;
            line-height: 1.2;
        }

        #content-area {
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .question-text {
            font-size: 1.15rem;
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 25px;
        }

        .reward-tag {
            display: inline-block;
            background: rgba(255, 117, 151, 0.15);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--accent);
            border: 1px solid rgba(255, 117, 151, 0.3);
            font-style: italic;
        }

        .controls {
            margin-top: 30px;
        }

        button {
            background: #ffffff;
            color: #000;
            border: none;
            padding: 18px 45px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        button:active { transform: scale(0.95); }

        .progress-container {
            margin-top: 30px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
        }

        .dot-progress {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
        }

        .dot.active { background: var(--accent); width: 15px; border-radius: 10px; }

        /* Audio Player Estilo */
        #music-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
        }

        .fade-out { opacity: 0; transform: translateY(-10px); }
        .fade-in { opacity: 1; transform: translateY(0); }

    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Rain-and-Flowers-chosic.com_.mp3" type="audio/mpeg">
    </audio>

    <div id="music-toggle" onclick="toggleMusic()">🔇</div>

    <div id="app-card">
        <div id="game-ui">
            <div class="header-meta" id="turn-label">O Ritual</div>
            <h1 id="title">Nossa Frequência</h1>
            
            <div id="content-area">
                <p class="question-text" id="main-text">
                    Preparem um ambiente calmo, deixem os telemóveis longe e olhem um para o outro. <br><br>
                    Este tempo é um presente para o vosso amor.
                </p>
                <div id="reward-area"></div>
            </div>

            <div class="controls">
                <button id="next-btn" onclick="handleNext()">Começar Experiência</button>
            </div>

            <div class="progress-container">
                <span id="step-label">Prontos para sintonizar?</span>
                <div class="dot-progress" id="dots"></div>
            </div>
        </div>
    </div>

    <script>
        const ritual = [
            { fase: 1, turn: "Vez Dele", q: "Qual foi o primeiro 'mico' ou momento engraçado que vivemos no início de tudo?", r: "🎁 Recompensa: Você ganhou um doce! Saboreie com calma." },
            { fase: 1, turn: "Vez Dela", q: "Se pudéssemos teletransportar agora para um encontro que já tivemos, qual escolherias?", r: "🎁 Recompensa: Escolha um doce para dar na boca dele(a)." },
            { fase: 1, turn: "Os Dois", q: "Qual mania minha que, no fundo, você acha que nos define como casal?", r: "🎁 Recompensa: Um brinde com o vosso doce favorito." },
            
            { fase: 2, turn: "Vez Dele", q: "O que eu faço que te faz sentir mais seguro(a) e amado(a) ao meu lado?", r: "🎁 Recompensa: Um abraço de 20 segundos sentindo o coração do outro." },
            { fase: 2, turn: "Ação Guiada", q: "Segurem as mãos e olhem-se nos olhos em silêncio por 30 segundos...", r: "🎁 Recompensa: Um beijo carinhoso na testa ou na mão." },
            { fase: 2, turn: "Vez Dela", q: "Qual detalhe simples da nossa rotina você mais sentiria falta se não estivéssemos juntos?", r: "🎁 Recompensa: Faça um elogio que ele(a) não espera ouvir hoje." },
            
            { fase: 3, turn: "Vez Dele", q: "Sussurre no ouvido algo que você adora no corpo ou na alma dela.", r: "🎁 Recompensa: Um beijo de verdade, demorado e presente." },
            { fase: 3, turn: "Vez Dela", q: "Faça uma massagem suave nos ombros ou mãos dele(a) por 2 minutos.", r: "🎁 Recompensa: Fechem os olhos e apenas sintam a presença um do outro." },
            { fase: 3, turn: "O Coração", q: "O que posso fazer na próxima semana para nutrir ainda mais a nossa conexão?", r: "🎁 Recompensa: Um abraço final onde os dois relaxam o peso do corpo." }
        ];

        let idx = -1;
        const music = document.getElementById('bg-music');
        const card = document.getElementById('content-area');

        function handleNext() {
            if (idx === -1) {
                music.play().catch(() => console.log("Áudio aguardando interação"));
                document.getElementById('music-toggle').innerText = "🔊";
            }

            idx++;
            if (idx < ritual.length) {
                renderStep(ritual[idx]);
            } else {
                renderFinal();
            }
        }

        function renderStep(step) {
            card.classList.add('fade-out');
            
            setTimeout(() => {
                // Atualiza Textos
                document.getElementById('turn-label').innerText = step.turn;
                document.getElementById('main-text').innerText = step.q;
                document.getElementById('reward-area').innerHTML = `<span class="reward-tag">${step.r}</span>`;
                document.getElementById('next-btn').innerText = "Próximo Passo";
                document.getElementById('step-label').innerText = `Etapa ${idx + 1} de ${ritual.length}`;

                // Atualiza Cores conforme Fase
                const body = document.body;
                if(step.fase === 1) body.style.background = "var(--fase1)";
                if(step.fase === 2) body.style.background = "var(--fase2)";
                if(step.fase === 3) body.style.background = "var(--fase3)";

                // Atualiza Dots
                updateDots();

                card.classList.remove('fade-out');
                card.classList.add('fade-in');
            }, 500);
        }

        function updateDots() {
            let dotsHtml = '';
            for(let i=0; i<ritual.length; i++) {
                dotsHtml += `<div class="dot ${i === idx ? 'active' : ''}"></div>`;
            }
            document.getElementById('dots').innerHTML = dotsHtml;
        }

        function renderFinal() {
            card.classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('turn-label').innerText = "Conexão Estabelecida";
                document.getElementById('main-text').innerHTML = `
                    <span style="font-family:'Playfair Display'; font-size: 1.5rem;">Sintonizados.</span><br><br>
                    O jogo termina aqui, mas a nossa frequência continua. Que este momento de presença se estenda por todos os nossos dias. ❤️
                `;
                document.getElementById('reward-area').innerHTML = "";
                document.getElementById('next-btn').style.display = "none";
                document.getElementById('step-label').innerText = "Feito com amor";
                card.classList.remove('fade-out');
                card.classList.add('fade-in');
            }, 500);
        }

        function toggleMusic() {
            if (music.paused) {
                music.play();
                document.getElementById('music-toggle').innerText = "🔊";
            } else {
                music.pause();
                document.getElementById('music-toggle').innerText = "🔇";
            }
        }
    </script>
</body>
</html>
