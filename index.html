<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa Frequência | Ritual de Conexão</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff7597;
            --secondary: #70a1ff;
            --bg-deep: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Background Animado Premium */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0c 100%);
            transition: var(--transition);
        }

        .orb {
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite alternate;
        }

        #orb1 { background: #4834d4; top: -10%; left: -10%; }
        #orb2 { background: #68273d; bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.2); }
        }

        /* Container Glassmorphism */
        .container {
            width: 90%;
            max-width: 420px;
            padding: 40px 30px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            z-index: 10;
            transform: translateY(0);
            transition: var(--transition);
        }

        .header-meta {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin: 0 0 25px 0;
            line-height: 1.2;
        }

        .content-box {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .question {
            font-size: 1.25rem;
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 25px;
            color: #f0f0f0;
        }

        .reward {
            font-size: 0.9rem;
            color: var(--primary);
            background: rgba(255, 117, 151, 0.1);
            padding: 12px 20px;
            border-radius: 15px;
            display: inline-block;
            border: 1px solid rgba(255, 117, 151, 0.2);
            font-style: italic;
        }

        /* Botão Premium */
        .btn-main {
            background: #ffffff;
            color: #0a0a0c;
            border: none;
            padding: 18px 40px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-main:active { transform: scale(0.96); opacity: 0.9; }

        /* Progress Bar */
        .progress-wrap {
            margin-top: 35px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.6s ease;
        }

        .step-info {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            white-space: nowrap;
        }

        /* Audio Control */
        #mute-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
        }

        /* Estados das Fases */
        .fase-1 { --primary: #70a1ff; }
        .fase-2 { --primary: #eccc68; }
        .fase-3 { --primary: #ff7597; }

        .fade-out { opacity: 0; transform: translateY(-10px); }
        .fade-in { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="fase-1">

    <div class="bg-glow" id="bg-glow">
        <div class="orb" id="orb1"></div>
        <div class="orb" id="orb2"></div>
    </div>

    <button id="mute-btn" onclick="toggleMute()">🔇</button>

    <audio id="bg-music" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Rain-and-Flowers-chosic.com_.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="game-ui">
            <div class="header-meta" id="turn-label">O Ritual de Vocês</div>
            <h1 id="main-title">Nossa Frequência</h1>
            
            <div class="content-box" id="content">
                <p class="question" id="text-display">
                    Preparem um ambiente calmo. <br>
                    Deixem o mundo lá fora por 25 minutos. <br><br>
                    Este é um convite para estarem, verdadeiramente, presentes um para o outro.
                </p>
                <div id="reward-display"></div>
            </div>

            <button class="btn-main" id="next-btn" onclick="nextStep()">Iniciar Experiência</button>

            <div class="progress-wrap">
                <div class="progress-bar"><div id="progress-fill"></div></div>
                <span class="step-info" id="step-count">Sintonizando...</span>
            </div>
        </div>
    </div>

    <script>
        const script = [
            // FASE 1 - LEVE
            { fase: 1, turn: "Sua Vez (Ele)", q: "Qual foi a primeira característica física ou detalhe que te chamou a atenção em mim?", r: "🎁 Recompensa: Você ganhou um doce! Saboreie lentamente." },
            { fase: 1, turn: "Vez Dela", q: "Se tivéssemos um portal para qualquer viagem que já fizemos, para onde você nos levaria agora?", r: "🎁 Recompensa: Escolha um doce para dar na boca dele(a)." },
            { fase: 1, turn: "Os Dois", q: "Qual é a nossa piada interna ou 'mico' favorito que sempre nos faz rir?", r: "🎁 Recompensa: Um brinde com o vosso doce favorito." },
            
            // FASE 2 - EMOCIONAL
            { fase: 2, turn: "Ritual de Presença", q: "Parem tudo agora. Segurem as mãos e olhem-se nos olhos em silêncio por 20 segundos...", r: "🎁 Recompensa: Um beijo suave na mão ou no rosto." },
            { fase: 2, turn: "Sua Vez (Ele)", q: "Em qual momento desta última semana você sentiu que eu fui seu porto seguro?", r: "🎁 Recompensa: Um abraço apertado de 20 segundos." },
            { fase: 2, turn: "Vez Dela", q: "O que eu faço que te faz sentir mais amada e valorizada como mulher?", r: "🎁 Recompensa: Um elogio sussurrado no ouvido." },
            
            // FASE 3 - ÍNTIMA
            { fase: 3, turn: "Sua Vez (Ele)", q: "Se pudéssemos parar o tempo hoje, o que você mais gostaria de desfrutar ao meu lado agora?", r: "🎁 Recompensa: Um beijo longo e sem pressa." },
            { fase: 3, turn: "Vez Dela", q: "Como eu posso ser um parceiro melhor para você nos próximos dias?", r: "🎁 Recompensa: Façam um carinho suave no cabelo ou pescoço do outro." },
            { fase: 3, turn: "Coração com Coração", q: "Sintam o batimento um do outro por um instante. O que o nosso amor significa para você hoje?", r: "🎁 Recompensa: Um abraço final onde os corpos relaxam completamente." }
        ];

        let current = -1;
        const music = document.getElementById('bg-music');
        const content = document.getElementById('content');

        function nextStep() {
            // Inicia música no primeiro clique
            if (current === -1) {
                music.play().catch(e => console.log("Áudio aguardando interação"));
                document.getElementById('mute-btn').innerText = "🔊";
            }

            current++;
            if (current < script.length) {
                updateUI(script[current]);
            } else {
                showFinal();
            }
        }

        function updateUI(data) {
            content.classList.add('fade-out');
            
            setTimeout(() => {
                // Atualiza Textos
                document.getElementById('turn-label').innerText = data.turn;
                document.getElementById('text-display').innerText = data.q;
                document.getElementById('reward-display').innerHTML = `<span class="reward">${data.r}</span>`;
                document.getElementById('next-btn').innerText = "Próximo Passo";
                
                // Atualiza Progresso
                const prog = ((current + 1) / script.length) * 100;
                document.getElementById('progress-fill').style.width = prog + "%";
                document.getElementById('step-count').innerText = `Etapa ${current + 1} de ${script.length}`;

                // Atualiza Visual da Fase
                document.body.className = `fase-${data.fase}`;
                
                content.classList.remove('fade-out');
                content.classList.add('fade-in');
            }, 500);
        }

        function showFinal() {
            content.classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('turn-label').innerText = "Sintonizados";
                document.getElementById('main-title').innerText = "O Ritual Conclui";
                document.getElementById('text-display').innerHTML = "Que este momento de entrega seja a semente para uma semana de mais amor e leveza entre vocês.<br><br>Vocês estão mais perto agora do que quando começaram.";
                document.getElementById('reward-display').innerHTML = "";
                document.getElementById('next-btn').innerText = "Recomeçar do Início";
                document.getElementById('next-btn').onclick = () => location.reload();
                
                content.classList.remove('fade-out');
                content.classList.add('fade-in');
            }, 500);
        }

        function toggleMute() {
            if (music.paused) {
                music.play();
                document.getElementById('mute-btn').innerText = "🔊";
            } else {
                music.pause();
                document.getElementById('mute-btn').innerText = "🔇";
            }
        }
    </script>
</body>
</html>
