<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa Frequência | Momento a Dois</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f0f12;
            --card: rgba(255, 255, 255, 0.06);
            --accent: #ff7597;
            --text: #ffffff;
            --fase1: #4a69bd;
            --fase2: #f6b93b;
            --fase3: #e55039;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 1.5s ease;
        }

        /* Background Gradiente Animado */
        .gradient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1e26 0%, #0f0f12 100%);
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .phase-indicator {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: 600;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin: 0 0 30px 0;
        }

        /* Área de Conteúdo com Transição */
        #display-area {
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
        }

        .main-text {
            font-size: 1.15rem;
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 20px;
        }

        .reward-badge {
            background: rgba(255, 117, 151, 0.15);
            color: var(--accent);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 117, 151, 0.3);
            animation: fadeIn 0.5s ease forwards;
        }

        /* Timer Circular Minimalista */
        #timer-display {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent);
            margin: 20px 0;
            display: none;
        }

        .btn-primary {
            background: #ffffff;
            color: #000;
            border: none;
            padding: 16px 40px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 100px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .btn-primary:active { transform: scale(0.95); }

        .btn-timer {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 25px;
            border-radius: 100px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Rodapé UX */
        .footer-info {
            margin-top: 30px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
        }

        #music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 100;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="gradient-bg"></div>
    
    <button id="music-control" onclick="toggleMusic()">🔇</button>

    <audio id="bg-audio" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Rain-and-Flowers-chosic.com_.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="phase-indicator" id="phase-name">Boas-vindas</div>
        <h1 id="title">Nossa Frequência</h1>

        <div id="display-area">
            <p class="main-text" id="text-content">
                Vamos tirar os próximos 25 minutos para nós? <br><br>
                Sem pressa, sem notificações. <br>Apenas a nossa sintonia.
            </p>
            <div id="timer-display">20</div>
            <div id="extra-content"></div>
        </div>

        <button class="btn-primary" id="action-btn" onclick="handleFlow()">Começar Momento</button>

        <div class="footer-info" id="footer-text">Deixe o telemóvel de lado ❤️</div>
    </div>

<script>
    // Configuração das Rodadas
    const rounds = [
        { fase: 1, label: "Leveza", q: "Qual é aquela mania minha que você já se acostumou e hoje até acha engraçada?", r: "Dê um sorriso para o outro e ganhe um doce.", type: "normal" },
        { fase: 1, label: "Leveza", q: "Se pudéssemos repetir um jantar ou passeio simples que fizemos, qual seria?", r: "Um beijo rápido de 'olá'.", type: "normal" },
        { fase: 2, label: "Conexão", q: "Qual detalhe bobo da nossa rotina em casa faz você sentir que estamos no caminho certo?", r: "Dê um abraço apertado por 20 segundos.", type: "timer", time: 20 },
        { fase: 2, label: "Conexão", q: "O que eu fiz recentemente, mesmo que pequeno, que fez você se sentir cuidado(a)?", r: "Um beijo carinhoso na testa.", type: "normal" },
        { fase: 3, label: "Intimidade", q: "Feche os olhos e sinta a minha presença. O que você mais valoriza no nosso 'nós'?", r: "Fazer um carinho no rosto por 30 segundos.", type: "timer", time: 30 },
        { fase: 3, label: "Intimidade", q: "Como eu posso te ajudar a ter uma semana mais leve a partir de amanhã?", r: "Um beijo demorado, sem pressa.", type: "normal" }
    ];

    let currentIdx = -1;
    let state = "INTRO"; // INTRO, QUESTION, REWARD, FINAL
    let timerInterval;

    const audio = document.getElementById('bg-audio');
    const textEl = document.getElementById('text-content');
    const extraEl = document.getElementById('extra-content');
    const btnEl = document.getElementById('action-btn');
    const timerEl = document.getElementById('timer-display');
    const phaseEl = document.getElementById('phase-name');

    function handleFlow() {
        if (state === "INTRO") {
            startExperience();
        } else if (state === "QUESTION") {
            showReward();
        } else if (state === "REWARD") {
            nextRound();
        } else if (state === "FINAL") {
            location.reload();
        }
    }

    function startExperience() {
        audio.play().catch(() => console.log("Áudio aguardando interação"));
        document.getElementById('music-control').innerText = "🔊";
        nextRound();
    }

    function nextRound() {
        currentIdx++;
        if (currentIdx < rounds.length) {
            state = "QUESTION";
            const round = rounds[currentIdx];
            
            // UI Update
            phaseEl.innerText = `Fase: ${round.label}`;
            textEl.style.opacity = 0;
            
            setTimeout(() => {
                textEl.innerText = round.q;
                extraEl.innerHTML = "";
                timerEl.style.display = "none";
                btnEl.innerText = "Responder";
                textEl.style.opacity = 1;
                document.getElementById('footer-text').innerText = `Etapa ${currentIdx + 1} de ${rounds.length}`;
            }, 300);
        } else {
            showFinal();
        }
    }

    function showReward() {
        state = "REWARD";
        const round = rounds[currentIdx];
        
        extraEl.innerHTML = `<div class="reward-badge">${round.r}</div>`;
        btnEl.innerText = "Concluído";

        if (round.type === "timer") {
            btnEl.style.display = "none";
            extraEl.innerHTML += `<br><button class="btn-timer" id="start-t-btn" onclick="startTimer(${round.time})">Iniciar Contagem</button>`;
        }
    }

    function startTimer(seconds) {
        document.getElementById('start-t-btn').style.display = "none";
        timerEl.style.display = "block";
        let timeLeft = seconds;
        timerEl.innerText = timeLeft;

        timerInterval = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerEl.innerText = "✓";
                btnEl.style.display = "block";
                // Sinal sonoro discreto ou vibração se suportado
                if(window.navigator.vibrate) window.navigator.vibrate(200);
            }
        }, 1000);
    }

    function showFinal() {
        state = "FINAL";
        phaseEl.innerText = "Sintonia Completa";
        textEl.innerHTML = "Obrigado por esse tempo. <br> O jogo acaba aqui, mas a conexão continua. <br><br> ❤️";
        extraEl.innerHTML = "";
        timerEl.style.display = "none";
        btnEl.innerText = "Finalizar";
    }

    function toggleMusic() {
        if (audio.paused) {
            audio.play();
            document.getElementById('music-control').innerText = "🔊";
        } else {
            audio.pause();
            document.getElementById('music-control').innerText = "🔇";
        }
    }
</script>
</body>
</html>
