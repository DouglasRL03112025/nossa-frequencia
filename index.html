<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo: Nossa Frequência 🎲</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        #game-container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
            transition: all 0.5s ease;
        }
        .fase-1 { border: 4px solid #4caf50; } /* Verde */
        .fase-2 { border: 4px solid #ffeb3b; } /* Amarelo */
        .fase-3 { border: 4px solid #f44336; } /* Vermelho */

        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { font-size: 1.1rem; line-height: 1.5; min-height: 80px; }
        .reward { color: #ffab40; font-weight: bold; margin-top: 15px; font-style: italic; }
        
        button {
            background-color: #ff4081;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
        .step-info { font-size: 0.8rem; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>

<div id="game-container" class="fase-1">
    <div id="content">
        <h1>🎲 Nossa Frequência</h1>
        <p id="text">Bem-vindos! Deixem os telemóveis de lado. O objetivo hoje é sintonizar um no outro. <br><br> Prontos?</p>
        <div id="reward" class="reward"></div>
        <button onclick="proximoPasso()">Começar Jogo</button>
        <div id="step-count" class="step-info">Prepara os doces! 🍬</div>
    </div>
</div>

<script>
    const jogo = [
        // FASE 1
        { fase: 1, txt: "Qual foi o primeiro 'mico' ou coisa engraçada que aconteceu no início do nosso namoro?", rew: "🎁 Recompensa: Quem responde ganha 1 doce!" },
        { fase: 1, txt: "Se pudéssemos repetir um único encontro que tivemos, qual seria?", rew: "🎁 Recompensa: 1 doce para quem respondeu!" },
        { fase: 1, txt: "Qual mania minha que, apesar de irritante, você acha que 'faz parte do pacote'?", rew: "🎁 Recompensa: 1 doce!" },
        
        // FASE 2
        { fase: 2, txt: "Qual característica minha você admira e que eu raramente recebo elogios por ela?", rew: "🎁 Recompensa: Um abraço de 20 segundos (Liberta ocitocina!)." },
        { fase: 2, txt: "Olhem-se nos olhos por 30 segundos em silêncio antes da próxima pergunta...", rew: "🎁 Recompensa: Carinho no rosto um do outro." },
        { fase: 2, txt: "Qual momento desta última semana fez você se sentir amado(a) ou cuidado(a) por mim?", rew: "🎁 Recompensa: Um beijo na testa ou na mão." },
        
        // FASE 3
        { fase: 3, txt: "Sussurre no ouvido do seu cônjuge algo que quer fazer com ele(a) no próximo fim de semana.", rew: "🎁 Recompensa: Um beijo de verdade (sem pressa)." },
        { fase: 3, txt: "Faça uma massagem rápida nos ombros ou pés do outro por 2 minutos.", rew: "🎁 Recompensa: Relaxem o peso do corpo um no outro." },
        { fase: 3, txt: "O que eu posso fazer na próxima semana para que você se sinta mais amado(a) e menos sobrecarregado(a)?", rew: "🎁 Recompensa: Um abraço bem longo e apertado." }
    ];

    let indice = -1;

    function proximoPasso() {
        indice++;
        const container = document.getElementById('game-container');
        const textElement = document.getElementById('text');
        const rewardElement = document.getElementById('reward');
        const stepElement = document.getElementById('step-count');
        const btn = document.querySelector('button');

        if (indice < jogo.length) {
            const etapa = jogo[indice];
            
            // Atualiza Texto e Recompensa
            textElement.innerText = etapa.txt;
            rewardElement.innerText = etapa.rew;
            stepElement.innerText = `Etapa ${indice + 1} de ${jogo.length}`;
            btn.innerText = "Próxima Pergunta";

            // Atualiza Cores conforme a Fase
            container.className = `fase-${etapa.fase}`;
        } else {
            textElement.innerHTML = "<strong>Jogo Concluído!</strong><br>Aproveitem este momento de conexão. ❤️";
            rewardElement.innerText = "";
            stepElement.innerText = "Sintonizados com sucesso.";
            btn.style.display = "none";
        }
    }
</script>

</body>
</html>
